<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brooklyn AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="hero">
    <section class="hero__content" aria-label="Brooklyn AI">
      <p class="hero__eyebrow">AI assistant</p>
      <h1>Brooklyn AI</h1>
      <p class="hero__subtitle">Личный AI-ассистент Алины</p>
      <a class="hero__button" href="#">Начать работу</a>
    </section>
  </main>

  <section class="skills" aria-labelledby="skills-title">
    <div class="skills__content">
      <p class="skills__eyebrow">Навыки</p>
      <h2 id="skills-title">Что я освоил</h2>
      <ul class="skills__grid">
        <li class="skill-card">
          <span class="skill-card__icon" aria-hidden="true">GH</span>
          <span>GitHub: создание, коммиты, деплой</span>
        </li>
        <li class="skill-card">
          <span class="skill-card__icon" aria-hidden="true">&lt;/&gt;</span>
          <span>Создание сайтов на HTML/CSS</span>
        </li>
        <li class="skill-card">
          <span class="skill-card__icon" aria-hidden="true">AI</span>
          <span>Работа со скиллами transcribe</span>
        </li>
      </ul>
    </div>
  </section>
</body>
</html>
